aid: zimmer-biomet
name: Zimmer Biomet
description: >-
  Zimmer Biomet is a global medical technology company that designs, manufactures,
  and markets orthopedic reconstructive products, sports medicine, biologics,
  extremities, trauma products, dental implants, and related surgical products.
  The company is a Fortune 500 organization with operations in over 25 countries
  and a portfolio of digital and robotic technologies including ZBEdge Dynamic
  Intelligence, ROSA Robotics, the mymobility patient app, Persona Knee, and
  ZBEdge Analytics. Zimmer Biomet does not currently publish a public REST API
  developer portal; its digital platforms are surfaced through partner integrations,
  hospital systems, and proprietary devices.
